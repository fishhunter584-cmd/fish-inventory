<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上班偷養魚資產管理系統</title>
    <!-- 引入 PapaParse 工具，用來解析 Google 試算表的 CSV 資料 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* (這裡的 CSS 樣式完全沒有改變，保持你原本的手機版優化外觀) */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f5f6fa;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; color: var(--primary-color); }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .tabs { display: flex; gap: 10px; }
        .tab-btn, .view-btn { padding: 8px 16px; border: 1px solid var(--border-color); background-color: #f1f2f6; color: var(--secondary-color); border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; white-space: nowrap; }
        .tab-btn:hover, .view-btn:hover { background-color: #e1e2e6; }
        .tab-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        .view-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; min-width: 500px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8f9fa; font-weight: 600; color: var(--primary-color); }
        tr:hover { background-color: #f1f2f6; }
        .jump-btn { background-color: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .jump-btn:hover { background-color: var(--accent-color); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; display: block; background-color: #ddd; }
        .card-content { padding: 15px; }
        .fish-name { font-size: 17px; font-weight: bold; margin: 0 0 10px 0; }
        .fish-price { color: #e74c3c; font-weight: bold; font-size: 16px; margin: 0; display: flex; justify-content: space-between; align-items: center; }
        .fish-price span { font-size: 12px; color: #7f8c8d; background: #ecf0f1; padding: 3px 8px; border-radius: 12px; }
        .highlight { border: 2px solid #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.4); animation: flash 1.5s ease-out; }
        @keyframes flash { 0% { background-color: #fadbd8; } 100% { background-color: white; } }
        .hidden { display: none !important; }
        /* 資料載入中的提示字樣 */
        #loadingMsg { text-align: center; padding: 40px; color: #7f8c8d; font-weight: bold; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 8px; }
            header { flex-direction: column; align-items: flex-start; gap: 5px; padding-bottom: 12px; margin-bottom: 15px; }
            h1 { font-size: 20px; }
            .controls { flex-direction: column; align-items: stretch; gap: 12px; }
            .tabs { overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
            .tab-btn, .view-btn { padding: 6px 12px; font-size: 13px; }
            .views { display: flex; width: 100%; gap: 5px; }
            .view-btn { flex: 1; text-align: center; }
            th, td { padding: 10px 8px; font-size: 14px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card img { height: 120px; }
            .card-content { padding: 10px; }
            .fish-name { font-size: 14px; margin-bottom: 5px; }
            .fish-price { font-size: 13px; flex-direction: column; align-items: flex-start; gap: 5px; }
            .fish-price span { font-size: 11px; padding: 1px 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📁 庫存明細</h1>
        <span style="color: #7f8c8d; font-size: 14px;" id="todayDate"></span>
    </header>

    <div class="controls">
        <div class="tabs">
            <button class="tab-btn active" onclick="filterCategory('all')">全部顯示</button>
            <button class="tab-btn" onclick="filterCategory('corydoras')">類別 A (鼠魚)</button>
            <button class="tab-btn" onclick="filterCategory('snakehead')">類別 B (雷龍)</button>
            <button class="tab-btn" onclick="filterCategory('food')">類別 C (飼料)</button>
            <button class="tab-btn" onclick="filterCategory('others')">類別 D (其他)</button>
        </div>
        <div class="views">
            <button class="view-btn active" id="btnList" onclick="switchView('list')">📄 條列清單</button>
            <button class="view-btn" id="btnGrid" onclick="switchView('grid')">🖼️ 照片檢視</button>
        </div>
    </div>

    <!-- 載入中提示 -->
    <div id="loadingMsg">📡 正在從資料庫同步最新庫存資料...</div>

    <!-- 條列模式 -->
    <div id="listView" class="hidden">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>品項編號 / 名稱</th>
                        <th>分類</th>
                        <th>單價 (NT$)</th>
                        <th>當前庫存</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 照片模式 -->
    <div id="gridView" class="grid hidden"></div>
</div>

<script>
    // ==========================================
    // 🔗 這裡貼上你剛剛發布出來的 Google 試算表 CSV 網址！
    // ==========================================
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvsgzT4KM1EZ0bMfJtt2_z7kJtIZwU_hmRJPzxMaTxiHU9aDeiN-kk10POs16OiVLeMvLIdy6qajqc/pub?output=csv";

    // 儲存從雲端抓下來的資料
    let fishData = [];

    const date = new Date();
    document.getElementById('todayDate').innerText = `資料更新：${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;

    // 從 Google 試算表抓取資料的函數
    function loadDataFromGoogleSheet() {
        // (已經幫你把錯誤檢查的機制拿掉了)

        Papa.parse(CSV_URL, {
            download: true,
            header: true, // 告訴解析器第一行是標題
            skipEmptyLines: true,
            complete: function(results) {
                // 將試算表的字串數字轉換為真正的數字
                fishData = results.data.map(item => ({
                    ...item,
                    price: Number(item.price),
                    stock: Number(item.stock)
                }));
                
                // 資料載入完成，隱藏提示，顯示表格並進行渲染
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('listView').classList.remove('hidden');
                renderData();
            },
            error: function(err) {
                document.getElementById('loadingMsg').innerText = '❌ 資料同步失敗，請確認試算表網址是否正確。';
                console.error(err);
            }
        });
    }

    function renderData() {
        const tbody = document.getElementById('tableBody');
        const grid = document.getElementById('gridView');
        tbody.innerHTML = '';
        grid.innerHTML = '';

        // 如果試算表沒資料，顯示提示
        if(fishData.length === 0) {
             document.getElementById('loadingMsg').innerText = '⚠️ 試算表裡面目前沒有資料喔！';
             document.getElementById('loadingMsg').style.display = 'block';
             return;
        }

        fishData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.className = `item-${item.category}`;
            tr.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td><span style="background:#eee; padding:2px 8px; border-radius:10px; font-size:12px;">${item.categoryName}</span></td>
                <td>${item.price.toLocaleString()}</td>
                <td>${item.stock}</td>
                <td><button class="jump-btn" onclick="jumpToPhoto(${index})">👁️ 查看</button></td>
            `;
            tbody.appendChild(tr);

            const card = document.createElement('div');
            card.className = `card item-${item.category}`;
            card.id = `card-${index}`;
            card.innerHTML = `
                <img src="${item.image}" alt="${item.name}">
                <div class="card-content">
                    <h3 class="fish-name">${item.name}</h3>
                    <p class="fish-price">NT$ ${item.price.toLocaleString()} <span>在庫: ${item.stock}</span></p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- 切換功能的程式碼 ---
    function filterCategory(category) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.currentTarget) {
            event.currentTarget.classList.add('active');
        }

        const items = document.querySelectorAll('#tableBody tr, #gridView .card');
        items.forEach(item => {
            if (category === 'all' || item.classList.contains('item-' + category)) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function switchView(view) {
        const listView = document.getElementById('listView');
        const gridView = document.getElementById('gridView');
        const btnList = document.getElementById('btnList');
        const btnGrid = document.getElementById('btnGrid');

        if (view === 'list') {
            listView.classList.remove('hidden');
            gridView.classList.add('hidden');
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
        } else {
            listView.classList.add('hidden');
            gridView.classList.remove('hidden');
            btnList.classList.remove('active');
            btnGrid.classList.add('active');
        }
    }

    function jumpToPhoto(index) {
        switchView('grid');
        const targetCard = document.getElementById(`card-${index}`);
        
        const firstTab = document.querySelector('.tab-btn');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        firstTab.classList.add('active');
        
        const items = document.querySelectorAll('#tableBody tr, #gridView .card');
        items.forEach(item => item.style.display = '');

        setTimeout(() => {
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
            targetCard.classList.add('highlight');
            setTimeout(() => { targetCard.classList.remove('highlight'); }, 1500);
        }, 100);
    }

    // 網頁開啟時，自動去 Google 試算表抓資料
    loadDataFromGoogleSheet();
</script>
